{% extends "base.html" %}
{% block content %}
<h2>النشر</h2>
<form method="POST" action="/post" enctype="multipart/form-data">
    <textarea name="content" placeholder="اكتب منشورك هنا"></textarea>
    <input type="file" name="file" accept="image/*,video/*" capture="environment">
    <button type="submit">نشر</button>
</form>

<h2>المنشورات</h2>
{% for post in posts %}
<div class="post">
    <p>{{ post['content'] }}</p>
    {% if post['media'] %}
        {% if post['media'].endswith('.mp4') %}
            <video controls>
                <source src="{{ url_for('static', filename='uploads/' + post['media']) }}" type="video/mp4">
            </video>
        {% else %}
            <img src="{{ url_for('static', filename='uploads/' + post['media']) }}" alt="post media">
        {% endif %}
    {% endif %}
    <div class="actions">
        <button type="button">👍</button>
        <button type="button">💬</button>
    </div>
</div>
{% endfor %}
{% endblock %}
